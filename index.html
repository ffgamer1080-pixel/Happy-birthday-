<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Happy Birthday Komal ❤️</title>
    <style>
        /* ============================================
           PART 1: RESET, BASE, SPLASH, COUNTDOWN
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }
        #app {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 9 / 16;
            background: #1a0a0a;
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            overflow: hidden;
            margin: 12px;
        }

        /* ===== SPLASH SCREEN ===== */
        #splash {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 50% 40%, #2d1a1a, #1a0a0a 70%);
            z-index: 100;
            transition: opacity 1s ease;
            padding: 2rem 1.2rem;
            text-align: center;
        }
        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .sub-text {
            font-size: 1rem;
            color: #e8c8c8;
            letter-spacing: 6px;
            font-weight: 300;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .stars {
            color: #d4af37;
            font-size: 1.6rem;
            letter-spacing: 10px;
            opacity: 0.7;
            margin: 2px 0;
        }
        .big-name {
            font-size: 3.8rem;
            font-family: 'Georgia', serif;
            font-weight: 900;
            font-style: italic;
            background: linear-gradient(180deg, #f9e5b3 0%, #d4af37 40%, #b8860b 80%, #f9e5b3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            line-height: 1.2;
            white-space: normal;
            word-wrap: break-word;
            max-width: 100%;
            padding: 0 5px;
        }
        .glow-line {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 4px auto;
            opacity: 0.4;
            border-radius: 2px;
        }
        .sub-text2 {
            font-size: 0.8rem;
            color: #c8a8a8;
            letter-spacing: 8px;
            font-weight: 300;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            padding-top: 0.6rem;
            width: 60%;
            margin: 0.3rem auto;
            text-transform: uppercase;
        }
        .typewriter {
            font-size: 1rem;
            color: #e8d0d0;
            margin: 0.8rem 0 1rem;
            min-height: 2.5rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            border-right: 2px solid #d4af37;
            padding-right: 8px;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: blinkCursor 0.9s step-end infinite;
        }
        @keyframes blinkCursor {
            0%, 100% { border-color: #d4af37; }
            50% { border-color: transparent; }
        }
        .countdown-big {
            font-size: 5rem;
            font-weight: 300;
            font-family: 'Georgia', serif;
            color: #f9e5b3;
            text-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
            animation: pulseGlow 0.8s ease-in-out infinite alternate;
            letter-spacing: 8px;
        }
        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* ===== HEART BUTTON ===== */
        #heart-btn {
            background: transparent;
            border: none;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin-top: 5px;
        }
        #heart-btn.show {
            display: flex;
        }
        .heart-icon {
            font-size: 4.8rem;
            filter: drop-shadow(0 0 40px rgba(255, 51, 102, 0.4));
            animation: heartPulse 1.4s ease-in-out infinite;
        }
        @keyframes heartPulse {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
            100% { transform: scale(1); }
        }
        .heart-label {
            color: #d4af37;
            font-size: 0.85rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: rgba(20, 15, 12, 0.8);
            padding: 5px 24px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            font-weight: 300;
        }

        /* ===== BOOK CONTAINER ===== */
        #book-container {
            position: absolute;
            inset: 0;
            background: transparent;
            z-index: 50;
            display: none;
            perspective: 1800px;
            perspective-origin: center 50%;
            overflow: hidden;
        }
        #book-container.active {
            display: block;
        }

        /* ===== FLOATING PETALS & MIST BACKGROUND ===== */
        #petals-container {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            background: linear-gradient(180deg, #fce4ec 0%, #f8d7da 30%, #fce4ec 60%, #f8bbd0 100%);
        }
        .petal {
            position: absolute;
            border-radius: 50% 0 50% 50%;
            opacity: 0.5;
            animation: floatPetal linear infinite;
            pointer-events: none;
        }
        @keyframes floatPetal {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 0.3;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg) scale(1);
                opacity: 0;
            }
        }
        .mist {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.3;
            animation: floatMist 20s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes floatMist {
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            50% { transform: translate(30px, -20px) scale(1.3); opacity: 0.4; }
            100% { transform: translate(-20px, 10px) scale(0.9); opacity: 0.25; }
        }

        /* ===== BOOK SURFACE ===== */
        #book-surface {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            height: 88%;
            background: radial-gradient(ellipse at center, rgba(252, 228, 236, 0.3), rgba(248, 187, 208, 0.1));
            border-radius: 20px;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.05);
        }

        /* ===== BOOK 3D ===== */
        #book {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 90%;
            height: 82%;
            transform: translate(-50%, -50%) rotateY(0deg);
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 2;
        }

        /* ===== PAGES ===== */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 4px 12px 12px 4px;
            background: #fcf6ed;
            box-shadow: -4px 4px 30px rgba(0,0,0,0.3), inset -2px 0 20px rgba(0,0,0,0.05);
            transition: transform 1s cubic-bezier(0.23, 1, 0.32, 1);
            transform-origin: left center;
            overflow: hidden;
            display: flex;
            padding: 12px;
            will-change: transform;
        }
        .page-inner {
            width: 100%;
            height: 100%;
            border-radius: 2px 8px 8px 2px;
            background: #fcf6ed;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.03);
            gap: 4px;
        }

        /* ===== LEFT PAGE (Lyrics) ===== */
        .page-left {
            width: 48%;
            height: 100%;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: rgba(252, 246, 237, 0.9);
            border-right: 1px solid rgba(212, 175, 55, 0.1);
        }
        .page-left .lyrics-container {
            width: 100%;
            max-height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2px;
        }
        .page-left .lyric-line {
            font-size: 0.65rem;
            font-family: 'Georgia', serif;
            letter-spacing: 0.5px;
            line-height: 1.5;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
            width: 100%;
            padding: 1px 0;
        }
        .page-left .lyric-line.show {
            opacity: 1;
            transform: translateY(0);
        }
        .page-left .lyric-line.hindi {
            color: #4a2a2a;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .page-left .lyric-line.hinglish {
            color: #8a6a5a;
            font-size: 0.6rem;
            font-style: italic;
            font-weight: 300;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 3px;
            margin-bottom: 3px;
        }

        /* ===== RIGHT PAGE (Photo) ===== */
        .page-right {
            width: 48%;
            height: 100%;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(252, 246, 237, 0.9);
        }
        .page-right .photo-container {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            background: #e8ddd0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .page-right .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.6s ease;
        }

        /* ===== COVER PAGE ===== */
        .page-cover {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fcf6ed;
            padding: 0;
        }
        .page-cover .cover-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: #fcf6ed;
        }
        .page-cover .cover-container img {
            width: 100%;
            height: 82%;
            object-fit: contain;
            border-radius: 4px;
            background: #e8ddd0;
        }
        .page-cover .cover-container .cover-title {
            margin-top: 8px;
            font-size: 1.4rem;
            font-weight: 400;
            color: #b8860b;
            letter-spacing: 3px;
        }
        .page-cover .cover-container .cover-sub {
            font-size: 0.65rem;
            letter-spacing: 5px;
            color: #8a7a6a;
            font-style: italic;
        }

        /* ===== WISHES PAGE ===== */
        .page-wishes {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            text-align: center;
            background: radial-gradient(ellipse at 30% 30%, #fcf6ed, #efe4d0);
        }
        .page-wishes h2 {
            font-size: 2.4rem;
            font-family: 'Georgia', serif;
            font-weight: 700;
            background: linear-gradient(180deg, #f9e5b3, #d4af37, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            margin-bottom: 6px;
        }
        .page-wishes .wish-text {
            font-size: 1rem;
            color: #5a4a3a;
            line-height: 1.8;
            font-style: italic;
            max-width: 90%;
            margin: 4px auto;
        }
        .page-wishes .wish-divider {
            width: 60px;
            height: 1px;
            background: rgba(184, 134, 11, 0.2);
            margin: 6px auto;
        }
        .page-wishes .love {
            margin-top: 8px;
            font-size: 1.8rem;
            color: #b8860b;
        }

        /* ===== BOOK SPINE ===== */
        .page::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 18px;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.06), transparent);
            pointer-events: none;
            border-radius: 4px 0 0 4px;
        }

        /* ===== PAGE NUMBER ===== */
        .page-number {
            position: absolute;
            bottom: 8px;
            right: 16px;
            font-size: 0.5rem;
            color: #b8a8a8;
            letter-spacing: 2px;
            font-style: italic;
        }

        /* ===== CONTROLS ===== */
        #flip-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            z-index: 300;
            display: none;
            justify-content: space-between;
            padding: 0 16px;
            pointer-events: none;
        }
        #flip-controls.active { display: flex; }
        .flip-btn {
            pointer-events: auto;
            background: rgba(20, 15, 12, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            color: #d4af37;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 70px;
            font-weight: 300;
        }
        .flip-btn:active { transform: scale(0.92); background: rgba(212, 175, 55, 0.15); }
        .flip-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            transform: none;
        }
        .flip-btn.prev {
            border-radius: 40px 8px 8px 40px;
            border-left: 2px solid rgba(212, 175, 55, 0.2);
        }
        .flip-btn.next {
            border-radius: 8px 40px 40px 8px;
            border-right: 2px solid rgba(212, 175, 55, 0.2);
        }

        /* ===== PROGRESS ===== */
        #progress {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            color: #b8a8a8;
            font-size: 0.55rem;
            letter-spacing: 4px;
            background: rgba(0,0,0,0.3);
            padding: 3px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(212, 175, 55, 0.08);
            font-weight: 300;
        }

        /* ===== FINAL SCREEN ===== */
        #final-screen {
            position: absolute;
            inset: 0;
            z-index: 200;
            background: radial-gradient(ellipse at center, #1a0a0a, #0a0505 70%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            color: #f0d9b0;
        }
        #final-screen.active { display: flex; }
        #final-screen .big-heart {
            font-size: 5.5rem;
            filter: drop-shadow(0 0 60px rgba(255, 51, 102, 0.4));
            animation: heartPulse 1.8s infinite;
        }
        #final-screen h3 {
            font-size: 2rem;
            letter-spacing: 4px;
            font-weight: 400;
            background: linear-gradient(180deg, #f9e5b3, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #final-screen p {
            font-size: 1rem;
            color: #c8a8a8;
            letter-spacing: 6px;
            font-weight: 300;
        }
        #final-screen .credit {
            margin-top: 1.4rem;
            font-size: 0.9rem;
            color: #b8860b;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            padding-top: 1rem;
            width: 60%;
            letter-spacing: 4px;
            font-weight: 300;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 420px) {
            .big-name { font-size: 3rem; }
            .heart-icon { font-size: 4.2rem; }
            .sub-text { font-size: 0.85rem; letter-spacing: 4px; }
            .typewriter { font-size: 0.85rem; }
            .countdown-big { font-size: 4rem; }
            .flip-btn { padding: 8px 12px; font-size: 0.6rem; min-width: 60px; }
            #flip-controls { padding: 0 10px; bottom: 25px; }
            .page-left .lyric-line.hindi { font-size: 0.65rem; }
            .page-left .lyric-line.hinglish { font-size: 0.55rem; }
            .page-wishes h2 { font-size: 2rem; }
            .page-wishes .wish-text { font-size: 0.85rem; }
            #book { width: 94%; height: 78%; }
            .page { padding: 8px; }
        }
        @media (max-width: 380px) {
            .big-name { font-size: 2.5rem; }
            #book { width: 96%; height: 74%; }
            .page-left .lyric-line.hindi { font-size: 0.6rem; }
            .page-left .lyric-line.hinglish { font-size: 0.5rem; }
        }
    </style>
</head>
<body>
<div id="app">

    <!-- SPLASH SCREEN -->
    <div id="splash">
        <div class="sub-text">Happy Birthday Dear</div>
        <div class="stars">★ ★ ★ ★ ★</div>
        <div class="big-name">MY LOVE KOMAL</div>
        <div class="glow-line"></div>
        <div class="sub-text2">❤️ Birthday Luxury ❤️</div>
        <div class="typewriter" id="typewriter">A Special Memory Awaits...</div>
        <div id="countdown-area" class="countdown-big">3</div>
        <button id="heart-btn">
            <span class="heart-icon">❤️</span>
            <span class="heart-label">Tap To Begin</span>
        </button>
    </div>
    <!-- BOOK CONTAINER -->
    <div id="book-container">
        <!-- Petals & Mist Background -->
        <div id="petals-container"></div>
        <!-- Book Surface -->
        <div id="book-surface"></div>
        <!-- Book -->
        <div id="book"></div>
        <!-- Controls -->
        <div id="flip-controls">
            <button class="flip-btn prev" id="prevBtn">‹ Prev</button>
            <button class="flip-btn next" id="nextBtn">Next ›</button>
        </div>
        <div id="progress">1 / 9</div>
    </div>

    <!-- FINAL SCREEN -->
    <div id="final-screen">
        <div class="big-heart">❤️</div>
        <h3>Thank You For Watching</h3>
        <p>Made With Love ❤️</p>
        <div class="credit">— Aniket</div>
    </div>
</div>
<script>
    (function() {
        'use strict';

        // ============================================
        // PART 2: LYRICS DATA + DOM ELEMENTS
        // ============================================

        // ===== LYRICS DATA (Hindi + Hinglish Matching) =====

            // Set 1
            {

                hinglish: ['Tanne main likhu Rani dil ki', 'Ya tanne Mumtaz likhunga', 'Je likhne mein baith gaya tanne', 'To pakka main kitaab likhunga']

                hinglish: ['Chaand feeka laage se', 'Yo roop kitna pyaara likhu', 'Ram ka ishaara likhu', 'Dekhya na nazaara likhu']

            // Set 6

                hinglish: ['Pariyon ke desh tai tu aayi', 'Visa daal ke', 'Red moon jaisi e tu', 'Laage se kamaal']
            },
            // Set 7
            {
                hindi: ['तन्ने मैं मेरी राधा लिख दूँ', 'मने मैं घनश्याम लिखूँगा', 'कैन्ट लिव विदाउट यू', 'यू बेबी माइन'],
                hinglish: ['Tanne main meri Radha likh dun', 'Mane main Ghanshyam likhunga', 'Can\'t live without you', 'You baby mine']
            },

    // ============================================
    // PART 3: CORE FUNCTIONS

    // ===== TYPEWRITER =====
    function typeWriter(text, el, speed) {
        speed = speed || 70;
        var i = 0;
        el.textContent = '';
        function type() {
            if (i < text.length) {
                el.textContent += text.charAt(i);
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    }

    // ===== COUNTDOWN =====
    var countdown = 3;
    function runCountdown() {
        if (countdownArea) {
            countdownArea.textContent = countdown;
        }
        if (countdown === 0) {
            countdownArea.style.display = 'none';
            heartBtn.classList.add('show');
            return;
        }
        countdown--;
        setTimeout(runCountdown, 800);
    }

    // ===== INIT =====
    typeWriter('A Special Memory Awaits...', typewriterEl, 70);
    setTimeout(function() {
        console.log('⏰ Countdown Starting...');
        runCountdown();
    }, 1200);

    // ===== CREATE PETALS & MIST =====
    function createPetalsAndMist() {
        // Create petals
        var colors = ['#f8bbd0', '#f48fb1', '#f06292', '#ec407a', '#fce4ec', '#ffcdd2'];
        for (var i = 0; i < 35; i++) {
            var petal = document.createElement('div');
            petal.className = 'petal';
            var size = 6 + Math.random() * 14;
            petal.style.width = size + 'px';
            petal.style.height = (size * 0.7) + 'px';
            petal.style.left = Math.random() * 100 + '%';
            petal.style.background = colors[Math.floor(Math.random() * colors.length)];
            petal.style.animationDuration = (15 + Math.random() * 25) + 's';
            petal.style.animationDelay = (Math.random() * 20) + 's';
            petal.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
            petal.style.opacity = 0.2 + Math.random() * 0.4;
            petalsContainer.appendChild(petal);
        }
        // Create mist
        for (var j = 0; j < 6; j++) {
            var mist = document.createElement('div');
            mist.className = 'mist';
            var size = 80 + Math.random() * 120;
            mist.style.width = size + 'px';
            mist.style.height = size + 'px';
            mist.style.left = Math.random() * 100 + '%';
            mist.style.top = Math.random() * 100 + '%';
            mist.style.background = j % 2 === 0 ? 'rgba(255, 255, 255, 0.15)' : 'rgba(248, 187, 208, 0.2)';
            mist.style.animationDuration = (18 + Math.random() * 15) + 's';

            petalsContainer.appendChild(mist);
        }

        bookContainer.classList.add('active');

        initMusic();
        buildBook();
        openBook();

    // ===== MUSIC =====
    function initMusic() {
        if (musicStarted) return;
        musicStarted = true;
        try {
            musicEl = new Audio('assets/music/romantic_track.mp3');
            musicEl.loop = false;
            musicEl.volume = 0;
            musicEl.play().then(function() {
                fadeInMusic();
            }).catch(function() {
                console.log('Music load failed, continuing...');
            });
        } catch (_) {
            console.log('Music error, continuing...');
        }
    }

    function fadeInMusic() {
        if (!musicEl) return;
        var vol = 0;
        var interval = setInterval(function() {
            if (vol < 0.4) {
                vol = vol + 0.03;
                musicEl.volume = Math.min(vol, 0.4);
            } else {
                clearInterval(interval);
            }
        }, 120);
    }

    function fadeOutMusic(callback) {
        if (!musicEl) {
            if (callback) callback();
            return;
        }
        var vol = musicEl.volume;
        var interval = setInterval(function() {
            if (vol > 0.05) {
                vol = vol - 0.05;
                musicEl.volume = Math.max(vol, 0);
            } else {
                clearInterval(interval);
                musicEl.pause();
                if (callback) callback();
            }
        }, 80);
    }

    // ===== AUTO FLIP =====
    function startAutoFlip() {
        if (autoFlipTimer) clearTimeout(autoFlipTimer);
        function autoFlip() {
            if (closing) return;
            if (currentPage < totalPages - 1) {
                flipToPage(currentPage + 1);
                autoFlipTimer = setTimeout(autoFlip, 10000);
            } else {
                closeBook();
            }
        }
        autoFlipTimer = setTimeout(autoFlip, 8000);
    }

    function stopAutoFlip() {
        if (autoFlipTimer) {
            clearTimeout(autoFlipTimer);
            autoFlipTimer = null;
        }
        isAutoFlip = false;
    }

    // ===== OPEN BOOK =====
    function openBook() {
        if (bookOpen) return;
        bookOpen = true;
        flipControls.classList.add('active');
        setTimeout(function() {
            flipToPage(0);
        }, 500);
    }
<script>
    // ============================================
    // PART 4: BUILD BOOK + COMPLETE
    // ============================================

    // ===== BUILD BOOK =====
    function buildBook() {
        book.innerHTML = '';
        pageElements = [];

        // Page 0: Cover
        var coverPage = createCoverPage();
        book.appendChild(coverPage);
        pageElements.push(coverPage);

        // Pages 1-6: Photo + Lyrics
        for (var i = 0; i < 6; i++) {
            var lyricSet = LYRICS_SET[i % LYRICS_SET.length];
            var photoPage = createPhotoLyricsPage(i + 1, lyricSet);
            book.appendChild(photoPage);
            pageElements.push(photoPage);
        }

        // Page 7-8: Wishes (2 pages)
        for (var w = 0; w < 2; w++) {
            var wishPage = createWishesPage(w);
            book.appendChild(wishPage);
            pageElements.push(wishPage);
        }

        totalPages = pageElements.length;

        // Set initial state
        for (var j = 0; j < pageElements.length; j++) {
            var p = pageElements[j];
            p.style.zIndex = totalPages - j;
            if (j === 0) {
                p.style.transform = 'rotateY(0deg)';
            } else {
                p.style.transform = 'rotateY(-180deg)';
            }
            p.style.opacity = '1';
        }

        currentPage = 0;
        updateProgress();
        updateButtons();
        setTimeout(function() {
            if (pageElements[0]) pageElements[0].classList.add('active');
        }, 100);
    }

    // ===== CREATE COVER PAGE =====
    function createCoverPage() {
        var page = document.createElement('div');
        page.className = 'page page-cover';
        page.innerHTML = `
            <div class="cover-container">
                <img src="assets/photos/front.jpg" alt="Front Cover">
                <div class="cover-title">✨ MY LOVE KOMAL ✨</div>
                <div class="cover-sub">❤️ Birthday ❤️</div>
            </div>
        `;
        return page;
    }

    // ===== CREATE PHOTO + LYRICS PAGE =====
    function createPhotoLyricsPage(num, lyricSet) {
        var page = document.createElement('div');
        page.className = 'page';
        var inner = document.createElement('div');
        inner.className = 'page-inner';

        // Left: Lyrics
        var leftDiv = document.createElement('div');
        leftDiv.className = 'page-left';
        var lyricsContainer = document.createElement('div');
        lyricsContainer.className = 'lyrics-container';
        lyricsContainer.id = 'lyrics-' + num;

        // Add 4 Hindi + 4 Hinglish lines
        for (var i = 0; i < 4; i++) {
            var hindiLine = document.createElement('div');
            hindiLine.className = 'lyric-line hindi';
            hindiLine.textContent = lyricSet.hindi[i] || '';
            lyricsContainer.appendChild(hindiLine);

            var hinglishLine = document.createElement('div');
            hinglishLine.className = 'lyric-line hinglish';
            hinglishLine.textContent = lyricSet.hinglish[i] || '';
            lyricsContainer.appendChild(hinglishLine);
        }
        leftDiv.appendChild(lyricsContainer);

        // Right: Photo
        var rightDiv = document.createElement('div');
        rightDiv.className = 'page-right';
        rightDiv.innerHTML = `
            <div class="photo-container">
                <img src="assets/photos/pic${num}.jpg" alt="Photo ${num}">
            </div>
        `;

        inner.appendChild(leftDiv);
        inner.appendChild(rightDiv);
        page.appendChild(inner);

        // Store lyrics elements for animation
        page._lyricsElements = lyricsContainer.querySelectorAll('.lyric-line');

        return page;
    }

    // ===== CREATE WISHES PAGE =====
    function createWishesPage(index) {
        var page = document.createElement('div');
        page.className = 'page page-wishes';
        var wish = WISHES[index % WISHES.length];
        page.innerHTML = `
            <h2>${wish.title}</h2>
            <div class="wish-divider"></div>
            <div class="wish-text">${wish.text}</div>
            <div class="wish-divider"></div>
            <div class="love">${wish.love}</div>
        `;
        return page;
    }

    // ===== ANIMATE LYRICS =====
    function animateLyrics(pageElement) {
        var lyrics = pageElement._lyricsElements;
        if (!lyrics) return;
        for (var i = 0; i < lyrics.length; i++) {
            setTimeout(function(idx) {
                return function() {
                    lyrics[idx].classList.add('show');
                };
            }(i), i * 200);
        }
    }

    // ===== FLIP TO PAGE =====
    function flipToPage(index) {
        if (isFlipping || closing) return;
        if (index < 0 || index >= totalPages) return;

        if (isManualClick && isAutoFlip) {
            stopAutoFlip();
            isManualClick = false;
        }

        isFlipping = true;

        for (var i = 0; i < pageElements.length; i++) {
            var p = pageElements[i];
            if (i <= index) {
                p.style.transform = 'rotateY(0deg)';
            } else {
                p.style.transform = 'rotateY(-180deg)';
            }
            p.style.zIndex = totalPages - i;
            if (i === index) {
                p.classList.add('active');
                // Animate lyrics if photo page
                if (p._lyricsElements) {
                    setTimeout(function() { animateLyrics(p); }, 300);
                }
            } else {
                p.classList.remove('active');
            }
        }

        currentPage = index;
        updateProgress();
        updateButtons();

        setTimeout(function() {
            isFlipping = false;
        }, 600);
    }

    // ===== UPDATE UI =====
    function updateProgress() {
        var total = totalPages || 9;
        progress.textContent = (Math.min(currentPage + 1, total)) + ' / ' + total;
    }

    function updateButtons() {
        prevBtn.disabled = currentPage === 0;
        nextBtn.disabled = currentPage === totalPages - 1;
    }

    // ===== CLOSE BOOK =====
    function closeBook() {
        if (closing) return;
        closing = true;
        stopAutoFlip();

        for (var i = pageElements.length - 1; i >= 0; i--) {
            var p = pageElements[i];
            p.style.transform = 'rotateY(-180deg)';
            p.style.zIndex = totalPages - i;
            p.classList.remove('active');
        }

        flipControls.classList.remove('active');
        fadeOutMusic(function() {
            finalScreen.classList.add('active');
            bookContainer.style.display = 'none';
        });
    }

    // ===== BUTTON EVENTS =====
    prevBtn.addEventListener('click', function() {
        if (currentPage > 0) {
            isManualClick = true;
            flipToPage(currentPage - 1);
        }
    });

    nextBtn.addEventListener('click', function() {
        if (currentPage < totalPages - 1) {
            isManualClick = true;
            flipToPage(currentPage + 1);
        } else {
            closeBook();
        }
    });

    // ===== KEYBOARD SUPPORT =====
    document.addEventListener('keydown', function(e) {
        if (!bookContainer.classList.contains('active')) return;
        if (e.key === 'ArrowRight' || e.key === ' ') {
            e.preventDefault();
            if (currentPage < totalPages - 1) {
                isManualClick = true;
                flipToPage(currentPage + 1);
            } else {
                closeBook();
            }
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            if (currentPage > 0) {
                isManualClick = true;
                flipToPage(currentPage - 1);
            }
        }
    });

    // ===== VISIBILITY =====
    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            if (musicEl) musicEl.pause();
            if (autoFlipTimer) clearTimeout(autoFlipTimer);
        } else {
            if (musicEl && musicStarted) {
                musicEl.play().catch(function() {});
            }
            if (isAutoFlip && !closing && bookOpen) {
                startAutoFlip();
            }
        }
    });

    // ===== PRELOAD IMAGES =====
    function preloadImages() {
        var names = ['front', 'back', 'pic1', 'pic2', 'pic3', 'pic4', 'pic5', 'pic6'];
        for (var i = 0; i < names.length; i++) {
            var img = new Image();
            img.src = 'assets/photos/' + names[i] + '.jpg';
        }
    }
    preloadImages();

    // ===== CLEANUP =====
    window.addEventListener('beforeunload', function() {
        if (musicEl) musicEl.pause();
        if (autoFlipTimer) clearTimeout(autoFlipTimer);
    });

    console.log('✅ All systems ready!');
    console.log('📖 Total pages: ' + (pageElements.length || 'building...'));
    console.log('🎵 Auto flip: 8 seconds each page');

    // Small hack to make auto-flip work after page build
    var origBuild = buildBook;
    buildBook = function() {
        origBuild();
        console.log('📖 Book built! Total pages: ' + totalPages);
    };

    })(); // <-- IIFE CLOSE
</script>
