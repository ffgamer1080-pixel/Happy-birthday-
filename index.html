<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Happy Birthday Komal ❤️</title>
  <!-- No frameworks, no Bootstrap, no Tailwind, no jQuery -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #1a0e0b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* main canvas – all screens stack */
    #app {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 9 / 16;
      background: #1a0e0b;
      border-radius: 32px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 2px #b8860b33 inset;
      overflow: hidden;
      margin: 12px;
    }

    /* splash / loading */
    #splash {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 30%, #2d1a13, #0f0806);
      z-index: 100;
      transition: opacity 0.8s ease;
      padding: 2rem;
      text-align: center;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #splash h1 {
      font-size: 3.2rem;
      background: linear-gradient(135deg, #f9e5b3, #d4af37, #f9e5b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px #d4af3766;
      letter-spacing: 6px;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .splash-sub {
      font-size: 1.2rem;
      color: #e4c580;
      letter-spacing: 3px;
      font-weight: 300;
      border-top: 1px solid #d4af3755;
      padding-top: 0.8rem;
      width: 80%;
      margin: 0 auto;
    }
    .typewriter {
      font-size: 1.1rem;
      color: #f0d9b0;
      margin: 1.2rem 0 1.8rem;
      min-height: 2.5rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      border-right: 2px solid #d4af37;
      padding-right: 6px;
      white-space: nowrap;
      overflow: hidden;
      display: inline-block;
      animation: blinkCursor 0.9s step-end infinite;
    }
    @keyframes blinkCursor {
      0%, 100% { border-color: #d4af37; }
      50% { border-color: transparent; }
    }

    .countdown-big {
      font-size: 4.5rem;
      font-weight: 700;
      color: #f9e5b3;
      text-shadow: 0 0 40px #d4af37, 0 0 80px #b8860b;
      animation: pulseGlow 0.8s ease-in-out infinite alternate;
      margin: 0.5rem 0;
    }
    @keyframes pulseGlow {
      0% { opacity: 0.6; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1.05); }
    }

    /* heart button */
    #heart-btn {
      background: transparent;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.2s;
      margin-top: 1.2rem;
    }
    #heart-btn:active { transform: scale(0.92); }
    .heart-icon {
      font-size: 4.8rem;
      filter: drop-shadow(0 0 30px #ff3366);
      animation: heartPulse 1.2s ease-in-out infinite;
      line-height: 1;
    }
    @keyframes heartPulse {
      0% { transform: scale(1); }
      15% { transform: scale(1.2); text-shadow: 0 0 40px #ff3366; }
      30% { transform: scale(1); }
      45% { transform: scale(1.15); text-shadow: 0 0 60px #ff6699; }
      60% { transform: scale(1); }
      100% { transform: scale(1); }
    }
    .heart-label {
      color: #f0d9b0;
      font-size: 1.1rem;
      letter-spacing: 4px;
      background: #2d1a13aa;
      padding: 6px 22px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid #d4af3766;
    }

    /* main book container (hidden until heart tap) */
    #book-container {
      position: absolute;
      inset: 0;
      background: #1a0e0b;
      z-index: 50;
      display: none;
      /* book 3D perspective */
      perspective: 1200px;
      perspective-origin: center;
    }
    #book-container.active {
      display: block;
    }

    #book {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      transition: transform 1.4s cubic-bezier(0.25, 0.1, 0.15, 1);
      transform: rotateY(0deg);
    }
    /* book pages stack */
    .page {
      position: absolute;
      width: 88%;
      height: 82%;
      backface-visibility: hidden;
      border-radius: 8px 18px 18px 8px;
      box-shadow: -6px 6px 30px rgba(0,0,0,0.7), 0 0 0 1px #b8860b55;
      background: #fcf3e0;
      transition: transform 1.2s cubic-bezier(0.25, 0.1, 0.15, 1), opacity 0.8s;
      transform-origin: left center;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
    }
    .page-inner {
      width: 100%;
      height: 100%;
      border-radius: 6px 14px 14px 6px;
      background: #fcf3e0;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 20px #d4af3722;
    }

    /* polaroid frame */
    .polaroid {
      width: 92%;
      height: 88%;
      background: #fcf3e0;
      padding: 10px 10px 20px 10px;
      border-radius: 6px 6px 12px 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 2px #d4af37, 0 0 0 4px #fcf3e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s;
      background: #fcf3e0;
    }
    .polaroid img {
      width: 100%;
      height: 80%;
      object-fit: cover;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      background: #b7a48b;
      transition: transform 0.2s;
    }
    .polaroid-caption {
      margin-top: 8px;
      font-size: 0.7rem;
      color: #5a3e2b;
      letter-spacing: 2px;
      font-weight: 600;
      background: #fcf3e0;
      padding: 0 8px;
      text-transform: uppercase;
    }

    /* birthday page */
    .birthday-page {
      background: radial-gradient(circle at 30% 30%, #fcf3e0, #efdecb);
      text-align: center;
      padding: 1rem;
    }
    .birthday-page h2 {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #b8860b, #d4af37, #f9e5b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
      letter-spacing: 4px;
    }
    .birthday-page .sub {
      font-size: 1.1rem;
      color: #5a3e2b;
      border-top: 1px solid #d4af3766;
      padding-top: 0.6rem;
      width: 70%;
      margin: 0 auto;
    }
    .birthday-page .love {
      margin-top: 1rem;
      font-size: 1.8rem;
      color: #b8860b;
    }

    /* final screen */
    #final-screen {
      position: absolute;
      inset: 0;
      z-index: 200;
      background: radial-gradient(circle at center, #2d1a13, #0f0806);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      color: #f0d9b0;
    }
    #final-screen.active {
      display: flex;
    }
    #final-screen .big-heart {
      font-size: 5rem;
      filter: drop-shadow(0 0 40px #ff3366);
      animation: heartPulse 1.6s infinite;
    }
    #final-screen h3 {
      font-size: 2rem;
      margin: 0.8rem 0 0.4rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #f9e5b3, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #final-screen p {
      font-size: 1rem;
      color: #c4a87a;
      letter-spacing: 3px;
    }
    #final-screen .credit {
      margin-top: 1.4rem;
      font-size: 0.9rem;
      color: #b8860b;
      border-top: 1px solid #d4af3744;
      padding-top: 1rem;
      width: 70%;
    }

    /* equalizer (music indicator) */
    #eq {
      position: absolute;
      bottom: 14px;
      right: 18px;
      z-index: 300;
      display: flex;
      gap: 4px;
      align-items: flex-end;
      height: 24px;
      opacity: 0.6;
      pointer-events: none;
    }
    #eq span {
      display: block;
      width: 4px;
      background: #d4af37;
      border-radius: 4px;
      animation: eqAnim 0.9s ease-in-out infinite alternate;
      height: 10px;
    }
    #eq span:nth-child(2) { height: 18px; animation-delay: 0.2s; }
    #eq span:nth-child(3) { height: 14px; animation-delay: 0.5s; }
    #eq span:nth-child(4) { height: 22px; animation-delay: 0.1s; }
    #eq span:nth-child(5) { height: 12px; animation-delay: 0.7s; }
    @keyframes eqAnim {
      0% { transform: scaleY(0.4); }
      100% { transform: scaleY(1.2); }
    }

    /* progress & page number */
    #progress {
      position: absolute;
      bottom: 8px;
      left: 18px;
      z-index: 300;
      color: #b8860b99;
      font-size: 0.65rem;
      letter-spacing: 2px;
      background: #1a0e0b88;
      padding: 3px 12px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
      border: 1px solid #d4af3733;
    }

    /* responsiveness */
    @media (max-width: 420px) {
      #splash h1 { font-size: 2.6rem; }
      .heart-icon { font-size: 4rem; }
      .birthday-page h2 { font-size: 2.2rem; }
    }
    @media (orientation: landscape) and (max-height: 500px) {
      #app { max-width: 70vh; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <h1>✨ KOMAL</h1>
    <div class="splash-sub">❤️ Birthday Luxury ❤️</div>
    <div class="typewriter" id="typewriter">A Special Memory Awaits...</div>
    <div id="countdown-area" class="countdown-big">3</div>
    <button id="heart-btn" style="display:none;">
      <span class="heart-icon">❤️</span>
      <span class="heart-label">Tap To Play</span>
    </button>
  </div>

  <!-- BOOK CONTAINER -->
  <div id="book-container">
    <div id="book">
      <!-- pages will be injected by JS -->
    </div>
    <!-- equalizer -->
    <div id="eq"><span></span><span></span><span></span><span></span><span></span></div>
    <div id="progress">1 / 9</div>
  </div>

  <!-- FINAL SCREEN -->
  <div id="final-screen">
    <div class="big-heart">❤️</div>
    <h3>Thank You For Watching</h3>
    <p>Made With Love ❤️</p>
    <div class="credit">— Aniket</div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---- CONFIG ----
    const PHOTOS = [
      'front.jpg', 'pic1.jpg', 'pic2.jpg', 'pic3.jpg', 
      'pic4.jpg', 'pic5.jpg', 'pic6.jpg', 'back.jpg'
    ];
    const LYRICS = [
      '✨ A new chapter begins',
      '🌟 You are the sunshine',
      '🌸 Beautiful soul',
      '💫 Keep shining bright',
      '🌹 Grace & elegance',
      '🎀 Pure happiness',
      '❤️ Endless love',
      '📖 Forever cherished'
    ];
    const BIRTHDAY_INDEX = 7; // after 6 photos, insert birthday page

    // state
    let currentPage = 0;
    let totalPages = 0;
    let isPlaying = false;
    let musicStarted = false;
    let musicEl = null;
    let pageTimer = null;
    let bookOpen = false;
    let closing = false;
    let audioCtx = null;

    const app = document.getElementById('app');
    const splash = document.getElementById('splash');
    const typewriterEl = document.getElementById('typewriter');
    const countdownArea = document.getElementById('countdown-area');
    const heartBtn = document.getElementById('heart-btn');
    const bookContainer = document.getElementById('book-container');
    const book = document.getElementById('book');
    const progress = document.getElementById('progress');
    const finalScreen = document.getElementById('final-screen');

    // ---- typewriter ----
    function typeWriter(text, el, speed = 80) {
      let i = 0;
      el.textContent = '';
      function type() {
        if (i < text.length) {
          el.textContent += text.charAt(i);
          i++;
          setTimeout(type, speed);
        }
      }
      type();
    }

    // ---- countdown ----
    let countdown = 3;
    function runCountdown() {
      countdownArea.textContent = countdown;
      if (countdown === 0) {
        countdownArea.style.display = 'none';
        heartBtn.style.display = 'flex';
        return;
      }
      countdown--;
      setTimeout(runCountdown, 800);
    }

    // init splash
    typeWriter('A Special Memory Awaits...', typewriterEl, 70);
    setTimeout(() => {
      runCountdown();
    }, 1200);

    // ---- Heart button tap ----
    heartBtn.addEventListener('click', function(e) {
      e.preventDefault();
      if (isPlaying) return;
      isPlaying = true;
      splash.classList.add('hidden');
      bookContainer.classList.add('active');
      // start music
      initMusic();
      // start book
      buildBook();
      openBook();
    });

    // ---- Music ----
    function initMusic() {
      if (musicStarted) return;
      musicStarted = true;
      try {
        musicEl = new Audio('assets/music/romantic_track.mp3');
        musicEl.loop = false;
        musicEl.volume = 0;
        musicEl.play().then(() => {
          fadeInMusic();
        }).catch(() => {});
      } catch (e) {}
    }

    function fadeInMusic() {
      if (!musicEl) return;
      let vol = 0;
      const interval = setInterval(() => {
        if (vol < 0.6) {
          vol += 0.04;
          musicEl.volume = Math.min(vol, 0.6);
        } else {
          clearInterval(interval);
        }
      }, 120);
    }

    function fadeOutMusic(callback) {
      if (!musicEl) { if (callback) callback(); return; }
      let vol = musicEl.volume;
      const interval = setInterval(() => {
        if (vol > 0.05) {
          vol -= 0.05;
          musicEl.volume = Math.max(vol, 0);
        } else {
          clearInterval(interval);
          musicEl.pause();
          if (callback) callback();
        }
      }, 80);
    }

    // ---- Build Book Pages ----
    function buildBook() {
      book.innerHTML = '';
      // front cover
      addPage('front', 0);
      // photos 1-6
      for (let i = 0; i < 6; i++) {
        addPage('photo', i+1, i);
      }
      // birthday page (inside)
      addBirthdayPage();
      // back cover
      addPage('back', 0);
      totalPages = book.children.length;
      // set all pages to closed (rotateY 0) except first front cover visible
      const pages = book.querySelectorAll('.page');
      pages.forEach((p, idx) => {
        if (idx === 0) {
          p.style.transform = 'rotateY(0deg)';
          p.style.zIndex = totalPages - idx;
        } else {
          p.style.transform = 'rotateY(-180deg)';
          p.style.zIndex = totalPages - idx;
        }
        p.style.opacity = '1';
      });
      // set current
      currentPage = 0;
      updateProgress();
    }

    function addPage(type, idx, lyricIdx) {
      const page = document.createElement('div');
      page.className = 'page';
      const inner = document.createElement('div');
      inner.className = 'page-inner';

      if (type === 'front') {
        inner.innerHTML = `
          <div class="polaroid" style="justify-content:center;background:#fcf3e0;">
            <img src="assets/photos/front.jpg" alt="Front" style="height:70%;width:90%;object-fit:cover;border-radius:6px;">
            <div style="margin-top:8px;font-size:1.4rem;font-weight:700;color:#b8860b;">✨ KOMAL ✨</div>
            <div style="font-size:0.7rem;letter-spacing:3px;color:#5a3e2b;">❤️ Birthday ❤️</div>
          </div>
        `;
      } else if (type === 'photo') {
        const num = idx;
        const lyric = LYRICS[lyricIdx] || '🌟';
        inner.innerHTML = `
          <div class="polaroid">
            <img src="assets/photos/pic${num}.jpg" alt="Photo ${num}" style="height:78%;width:100%;object-fit:cover;">
            <div class="polaroid-caption">${lyric}</div>
          </div>
        `;
      } else if (type === 'back') {
        inner.innerHTML = `
          <div class="polaroid" style="justify-content:center;background:#fcf3e0;">
            <img src="assets/photos/back.jpg" alt="Back" style="height:70%;width:90%;object-fit:cover;border-radius:6px;">
            <div style="margin-top:8px;font-size:1.2rem;color:#5a3e2b;">🌟 Forever 🌟</div>
          </div>
        `;
      }
      page.appendChild(inner);
      book.appendChild(page);
    }

    function addBirthdayPage() {
      const page = document.createElement('div');
      page.className = 'page';
      const inner = document.createElement('div');
      inner.className = 'page-inner birthday-page';
      inner.innerHTML = `
        <h2>🎂 Happy Birthday</h2>
        <div style="font-size:2.2rem;margin:0.2rem 0;">KOMAL ❤️</div>
        <div class="sub">Wishing you all the love & happiness</div>
        <div class="love">❤️ Made With Love ❤️</div>
        <div style="margin-top:0.8rem;font-size:0.9rem;color:#b8860b;">— Aniket</div>
      `;
      page.appendChild(inner);
      // insert after photo 6 (index 7)
      const children = book.children;
      if (children.length >= 7) {
        book.insertBefore(page, children[7]);
      } else {
        book.appendChild(page);
      }
    }

    // ---- Book open / page flip ----
    function openBook() {
      if (bookOpen) return;
      bookOpen = true;
      // front cover visible, flip to show first page
      setTimeout(() => {
        flipToPage(1);
      }, 800);
    }

    function flipToPage(index) {
      if (closing) return;
      const pages = book.querySelectorAll('.page');
      if (index >= pages.length) {
        // end of book -> close
        closeBook();
        return;
      }
      // flip all pages before index to 0deg, current to -180deg
      for (let i = 0; i < pages.length; i++) {
        const p = pages[i];
        if (i <= index) {
          p.style.transform = 'rotateY(0deg)';
          p.style.zIndex = totalPages - i;
        } else {
          p.style.transform = 'rotateY(-180deg)';
          p.style.zIndex = totalPages - i;
        }
      }
      currentPage = index;
      updateProgress();

      // schedule next page
      let delay = 2800;
      if (index === 0) delay = 2000;
      else if (index === 1) delay = 2600;
      else if (index === 7) delay = 4000; // birthday page
      else if (index === 8) delay = 2500; // back cover
      else delay = 2800;

      if (pageTimer) clearTimeout(pageTimer);
      pageTimer = setTimeout(() => {
        if (!closing) {
          flipToPage(index + 1);
        }
      }, delay);
    }

    function closeBook() {
      if (closing) return;
      closing = true;
      if (pageTimer) clearTimeout(pageTimer);
      // close all pages
      const pages = book.querySelectorAll('.page');
      for (let i = pages.length - 1; i >= 0; i--) {
        const p = pages[i];
        p.style.transform = 'rotateY(-180deg)';
        p.style.zIndex = totalPages - i;
      }
      // fade out music
      fadeOutMusic(() => {
        // show final screen
        finalScreen.classList.add('active');
        bookContainer.style.display = 'none';
      });
    }

    function updateProgress() {
      const total = totalPages || 9;
      progress.textContent = `${Math.min(currentPage+1, total)} / ${total}`;
    }

    // ---- Pause / Resume (visibility) ----
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (musicEl) musicEl.pause();
      } else {
        if (musicEl && musicStarted) musicEl.play().catch(()=>{});
      }
    });

    // ---- Preload images (optional) ----
    function preloadImages() {
      const names = ['front','back','pic1','pic2','pic3','pic4','pic5','pic6'];
      names.forEach(n => {
        const img = new Image();
        img.src = `assets/photos/${
